services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: partsbench
    ports:
      - "5432:5432"
    volumes:
      - partsbench_pg_data:/var/lib/postgresql/data
      - ./docker/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # web console
    volumes:
      - partsbench_minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-off: creates the dev + test buckets and makes them private, then exits.
  # docker-compose.yml stands in for the real Cloudflare R2 bucket during local dev
  # (docs/build/07-photo-pipeline.md) — same pattern as Postgres standing in for Neon.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/partsbench;
      mc mb --ignore-existing local/partsbench-test;
      mc anonymous set none local/partsbench;
      mc anonymous set none local/partsbench-test;
      exit 0;
      "

volumes:
  partsbench_pg_data:
  partsbench_minio_data:
